name: Newman Contract Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  newman:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Lint OpenAPI contracts
        run: npm run lint:contracts

      - name: Start Prism mock servers
        run: |
          nohup npm run mock:alerts > prism-alerts.log 2>&1 &
          echo "Mock server started. Waiting for startup..."
          sleep 2

      - name: Wait for mock servers
        run: npx wait-on http://localhost:4010/health --timeout 60000

      - name: Verify mock server health
        run: |
          echo "Checking mock server health..."
          curl -v http://localhost:4010/health || true

      - name: Run Newman contract tests
        run: npm run test:alerts

      - name: Show Prism logs on failure
        if: failure()
        run: |
          echo "=== Prism Alerts Log ==="
          cat prism-alerts.log || true
          echo "=== Checking running processes ==="
          ps aux | grep prism || true
          echo "=== Network connectivity ==="
          netstat -tuln || ss -tuln || true

      - name: Upload Newman reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-reports
          path: reports/
