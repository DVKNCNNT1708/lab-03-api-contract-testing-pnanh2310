name: Newman Contract Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  newman:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Lint OpenAPI contracts
        run: npm run lint:contracts

      - name: Start Prism mock servers
        run: |
          npm run mock:iot > prism-iot.log 2>&1 &
          IOT_PID=$!

          npm run mock:vision > prism-vision.log 2>&1 &
          VISION_PID=$!

          echo "IOT_PID=$IOT_PID" >> $GITHUB_ENV
          echo "VISION_PID=$VISION_PID" >> $GITHUB_ENV

          sleep 10

      - name: Check mock server health
        run: |
          curl -f http://localhost:4010/health || exit 1
          curl -f http://localhost:4011/health || exit 1

      - name: Run Newman contract tests
        run: npm run test:mock

      - name: Generate HTML report
        run: npm run test:html

      - name: Show logs on failure
        if: failure()
        run: |
          echo "=== IOT LOG ==="
          cat prism-iot.log || true

          echo "=== VISION LOG ==="
          cat prism-vision.log || true

      - name: Upload Newman reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-reports
          path: reports/name: Newman Contract Tests

