openapi: 3.0.0
info:
  title: Smart Campus Lab 02 Contract Template
  version: 1.0.0
  description: Hop dong API cho Smart Campus - Alert duoc sinh tu dong tu cac event
  contact:
    name: FIT4110 Teaching Team
    email: fit4110@example.edu.vn
servers:
  - url: http://localhost:4010
    description: Prism mock server
  - url: https://api.campus.local
    description: Class network placeholder
tags:
  - name: health
    description: Kiem tra trang thai service
  - name: alerts
    description: Quan ly canh bao Smart Campus tu dong sinh tu event
  - name: notifications
    description: Quan ly thong bao da kenh
  - name: events
    description: Quan ly su kien nghiep vu
security:
  - bearerAuth: []
paths:
  /health:
    get:
      operationId: getHealth
      summary: Kiem tra trang thai service
      tags:
        - health
      security: []
      responses:
        '200':
          description: Service dang hoat dong
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
  /api/alerts:
    get:
      operationId: listAlerts
      summary: Lay danh sach canh bao
      description: Lay danh sach cac canh bao trong Smart Campus
      tags:
        - alerts
      parameters:
        - name: severity
          in: query
          required: false
          description: Loc theo muc do nghiem trong
          schema:
            type: string
            enum:
              - INFO
              - WARNING
              - CRITICAL
        - name: status
          in: query
          required: false
          description: Loc theo trang thai
          schema:
            type: string
            enum:
              - ACTIVE
              - ACKNOWLEDGED
              - RESOLVED
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: cursor
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Danh sach canh bao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertPage'
        '401':
          description: Thieu hoac sai thong tin xac thuc
        '500':
          description: Loi khong mong muon phia server
  /api/alerts/{alertId}:
    get:
      operationId: getAlertById
      summary: Lay chi tiet canh bao
      tags:
        - alerts
      parameters:
        - name: alertId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Chi tiet canh bao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Alert'
        '404':
          description: Khong tim thay canh bao
        '500':
          description: Loi khong mong muon phia server
  /api/alerts/{alertId}/acknowledge:
    patch:
      operationId: acknowledgeAlert
      summary: Xac nhan da doc canh bao
      tags:
        - alerts
      parameters:
        - name: alertId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Da xac nhan canh bao
        '404':
          description: Khong tim thay canh bao
        '500':
          description: Loi khong mong muon phia server
  /api/alerts/{alertId}/resolve:
    patch:
      operationId: resolveAlert
      summary: Danh dau canh bao da duoc giai quyet
      tags:
        - alerts
      parameters:
        - name: alertId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                resolutionNote:
                  type: string
      responses:
        '204':
          description: Da danh dau da giai quyet
        '404':
          description: Khong tim thay canh bao
        '500':
          description: Loi khong mong muon phia server
  /events:
    post:
      operationId: createCampusEvent
      summary: Gui su kien nghiep vu vao he thong
      description: He thong se tu dong sinh alert neu su kien bat thuong
      tags:
        - events
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CampusEvent'
      responses:
        '201':
          description: Su kien da duoc ghi nhan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventAccepted'
        '400':
          description: Du lieu sai dinh dang
        '401':
          description: Thieu hoac sai thong tin xac thuc
        '422':
          description: Payload dung dinh dang nhung khong hop le
        '500':
          description: Loi server
  /api/notifications:
    post:
      operationId: createNotification
      summary: Gui thong bao
      description: Khi mot alert duoc tao, he thong se tu dong goi endpoint nay
      tags:
        - notifications
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationRequest'
      responses:
        '201':
          description: Da gui thong bao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationResponse'
        '400':
          description: Du lieu sai dinh dang
        '401':
          description: Thieu hoac sai thong tin xac thuc
        '500':
          description: Loi server
    get:
      operationId: listNotifications
      summary: Xem lich su thong bao
      tags:
        - notifications
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: cursor
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Danh sach thong bao
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationPage'
        '401':
          description: Thieu xac thuc
        '500':
          description: Loi server
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    HealthStatus:
      type: object
      required:
        - status
        - service
        - time
      properties:
        status:
          type: string
          enum:
            - ok
        service:
          type: string
        time:
          type: string
          format: date-time
    Alert:
      type: object
      required:
        - alertId
        - title
        - severity
        - status
        - sourceEventId
        - sourceType
        - triggeredAt
      properties:
        alertId:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        severity:
          type: string
          enum:
            - INFO
            - WARNING
            - CRITICAL
        status:
          type: string
          enum:
            - ACTIVE
            - ACKNOWLEDGED
            - RESOLVED
        sourceEventId:
          type: string
        sourceType:
          type: string
        location:
          type: string
        triggeredAt:
          type: string
          format: date-time
        acknowledgedAt:
          type: string
          format: date-time
        resolvedAt:
          type: string
          format: date-time
        resolutionNote:
          type: string
    AlertPage:
      type: object
      required:
        - items
        - hasMore
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Alert'
        nextCursor:
          type: string
        hasMore:
          type: boolean
    CampusEvent:
      oneOf:
        - $ref: '#/components/schemas/SensorEvent'
        - $ref: '#/components/schemas/AccessEvent'
      discriminator:
        propertyName: eventType
        mapping:
          SENSOR_READING: '#/components/schemas/SensorEvent'
          ACCESS_CHECK: '#/components/schemas/AccessEvent'
    SensorEvent:
      type: object
      required:
        - eventType
        - eventId
        - deviceId
        - metric
        - value
        - unit
        - timestamp
      properties:
        eventType:
          type: string
          enum:
            - SENSOR_READING
        eventId:
          type: string
          format: uuid
        deviceId:
          type: string
        metric:
          type: string
          enum:
            - temperature
            - humidity
            - smoke
            - motion
        value:
          type: number
        unit:
          type: string
        timestamp:
          type: string
          format: date-time
    AccessEvent:
      type: object
      required:
        - eventType
        - eventId
        - gateId
        - cardId
        - decision
        - timestamp
      properties:
        eventType:
          type: string
          enum:
            - ACCESS_CHECK
        eventId:
          type: string
          format: uuid
        gateId:
          type: string
        cardId:
          type: string
        decision:
          type: string
          enum:
            - ALLOW
            - DENY
        timestamp:
          type: string
          format: date-time
    EventAccepted:
      type: object
      properties:
        eventId:
          type: string
          format: uuid
        acceptedAt:
          type: string
          format: date-time
        generatedAlertId:
          type: string
          format: uuid
    NotificationRequest:
      type: object
      required:
        - alertId
        - channels
        - receivers
      properties:
        alertId:
          type: string
          format: uuid
        channels:
          type: array
          items:
            type: string
            enum:
              - email
              - telegram
              - sms
        receivers:
          type: array
          items:
            type: object
            properties:
              userId:
                type: string
              email:
                type: string
              phone:
                type: string
              telegramChatId:
                type: string
        priority:
          type: string
          enum:
            - LOW
            - MEDIUM
            - HIGH
            - CRITICAL
    NotificationResponse:
      type: object
      properties:
        notificationId:
          type: string
          format: uuid
        status:
          type: string
          enum:
            - PENDING
            - SENT
            - FAILED
        sentAt:
          type: string
          format: date-time
    NotificationPage:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/NotificationResponse'
        nextCursor:
          type: string
        hasMore:
          type: boolean